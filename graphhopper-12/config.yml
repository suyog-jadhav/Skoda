graphhopper:

  # ── Map Data ────────────────────────────────────────────────
  datareader.file: india-latest.osm.pbf
  graph.location: graph-cache

  # ── Allow rural roads (track/path removed from ignore list) ──
  # FIXED: Removed 'track' and 'path' to include rural Indian roads
  import.osm.ignored_highways: footway,cycleway,steps,pedestrian,platform

  # ── Encoded Values ──────────────────────────────────────────
  graph.encoded_values: >
    max_weight,
    max_height,
    max_width,
    max_length,
    max_axle_load,
    road_class,
    road_environment,
    road_access,
    surface,
    smoothness,
    toll,
    hazmat,
    hazmat_water,
    hazmat_tunnel,
    roundabout,
    lanes,
    country

  # ── Map UI Settings (all inside graphhopper block) ──────────
  routing.default_snap_prevention: ferry,ford
  routing.default_profile: truck

  # Map starts centered on India
  routing.start_lat: 20.5937
  routing.start_lon: 78.9629
  routing.start_zoom: 5

  # Free OSM tiles — no API key needed
  routing.tile_url: "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
  routing.tile_url_2: ""

  # ── Snapping Configuration ──────────────────────────────────
  # FIXED: Increased search radius for rural areas where roads are sparse
  index.max_region_search: 32

  # ── Profiles ────────────────────────────────────────────────
  profiles:

    - name: truck
      weighting: custom
      custom_model:
        speed:
          - if: "true"
            limit_to: 80
          - if: "road_class == MOTORWAY"
            limit_to: 80
          - if: "road_class == PRIMARY"
            limit_to: 60
          - if: "road_class == SECONDARY"
            limit_to: 50
          - if: "road_class == TERTIARY"
            limit_to: 40
          - if: "road_class == RESIDENTIAL"
            limit_to: 20
          - if: "road_class == UNCLASSIFIED"
            limit_to: 30
          - if: "surface == UNPAVED || surface == DIRT || surface == GROUND || surface == GRASS"
            limit_to: 15
          - if: "surface == GRAVEL || surface == COMPACTED"
            limit_to: 25
          - if: "smoothness == BAD || smoothness == VERY_BAD"
            multiply_by: 0.5
          - if: "smoothness == HORRIBLE || smoothness == VERY_HORRIBLE"
            multiply_by: 0.2
        priority:
          - if: "max_weight < 20"
            multiply_by: 0
          - if: "max_height < 4.0"
            multiply_by: 0
          - if: "max_width < 2.5"
            multiply_by: 0
          - if: "max_length < 12"
            multiply_by: 0
          - if: "max_axle_load < 8"
            multiply_by: 0
          - if: "road_access == PRIVATE || road_access == NO"
            multiply_by: 0
          - if: "road_class == LIVING_STREET"
            multiply_by: 0
          - if: "road_class == MOTORWAY"
            multiply_by: 1.5
          - if: "road_class == PRIMARY"
            multiply_by: 1.2
          - if: "road_class == RESIDENTIAL"
            multiply_by: 0.3
          - if: "road_class == UNCLASSIFIED"
            multiply_by: 0.5
          - if: "toll == ALL"
            multiply_by: 0.9
          - if: "roundabout == true"
            multiply_by: 0.8
        distance_influence: 70

    - name: heavy_truck
      weighting: custom
      custom_model:
        speed:
          - if: "true"
            limit_to: 60
          - if: "road_class == MOTORWAY"
            limit_to: 60
          - if: "road_class == PRIMARY"
            limit_to: 50
          - if: "road_class == SECONDARY"
            limit_to: 40
          - if: "road_class == RESIDENTIAL"
            limit_to: 15
          - if: "surface == UNPAVED || surface == DIRT"
            limit_to: 10
          - if: "smoothness == BAD || smoothness == VERY_BAD"
            multiply_by: 0.4
        priority:
          - if: "max_weight < 40"
            multiply_by: 0
          - if: "max_height < 4.5"
            multiply_by: 0
          - if: "max_width < 2.55"
            multiply_by: 0
          - if: "max_length < 16"
            multiply_by: 0
          - if: "max_axle_load < 10"
            multiply_by: 0
          - if: "road_access == PRIVATE || road_access == NO"
            multiply_by: 0
          - if: "road_class == LIVING_STREET || road_class == RESIDENTIAL"
            multiply_by: 0
          - if: "road_class == MOTORWAY"
            multiply_by: 2.0
          - if: "road_class == PRIMARY"
            multiply_by: 1.3
          - if: "toll == ALL"
            multiply_by: 0.85
        distance_influence: 80

    - name: hazmat_truck
      weighting: custom
      custom_model:
        speed:
          - if: "true"
            limit_to: 60
          - if: "road_class == MOTORWAY"
            limit_to: 60
          - if: "road_class == PRIMARY"
            limit_to: 50
          - if: "road_class == SECONDARY"
            limit_to: 40
          - if: "road_class == RESIDENTIAL"
            limit_to: 15
        priority:
          - if: "max_weight < 20"
            multiply_by: 0
          - if: "max_height < 4.0"
            multiply_by: 0
          - if: "max_width < 2.5"
            multiply_by: 0
          - if: "hazmat == NO"
            multiply_by: 0
          - if: "hazmat_tunnel == B || hazmat_tunnel == C || hazmat_tunnel == D || hazmat_tunnel == E"
            multiply_by: 0
          - if: "hazmat_water == NO"
            multiply_by: 0
          - if: "road_environment == TUNNEL"
            multiply_by: 0
          - if: "road_environment == BRIDGE"
            multiply_by: 0.5
          - if: "road_access == PRIVATE || road_access == NO"
            multiply_by: 0
          - if: "road_class == MOTORWAY"
            multiply_by: 1.5
          - if: "road_class == PRIMARY"
            multiply_by: 1.2
          - if: "road_class == RESIDENTIAL"
            multiply_by: 0
        distance_influence: 60

  # ── CH disabled, LM enabled ──────────────────────────────────
  profiles_ch: []
  profiles_lm:
    - profile: truck
    - profile: heavy_truck
    - profile: hazmat_truck

  # ── Memory tuned for 12GB RAM ────────────────────────────────
  graph.dataaccess: RAM_STORE
  datareader.dataaccess: RAM_STORE

server:
  application_connectors:
    - type: http
      port: 8989
      bind_host: 0.0.0.0
  admin_connectors:
    - type: http
      port: 8990
      bind_host: 0.0.0.0
  max_threads: 128
  min_threads: 8
